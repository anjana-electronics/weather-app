<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
    
    <div class="app">
       <div class="search">
        <input type="text"
        placeholder="Enter city name"
        spellcheck="false">
        <button><img src="icon.png" width="50"></button>
        
       </div>

       <div class="weather">
        <img src="cloudy.png" width="100">
        
        <h1 class="temp">22°C </h1>
        
        <h2 class="city">New York</h2>
        <div class="details">
            <div class="col">
                <img src="weather.png" width="100">
                <div>
                    <p class="humidity">50%</p>
                    <p >Humidity</p>
                </div>
              
            </div>
            <div class="col">
                <img src="wind.png" width="100">
                <div>
                    <p class="wind">15km/hr</p>
                    <p>Wind speed</p>
                </div>
              
            </div>
        </div>
       </div>

    </div>
<script>
    const apikey="f7af58c26e52b16f0f619229334e3ce7";
    const apiurl="https://api.openweathermap.org/data/2.5/weather?units=metric";
    const searchbox=document.querySelector(".search input");
    const searchbtn=document.querySelector(".search button");
    async function checkWeather(city){
       const response=await fetch(`${apiurl}&q=${encodeURIComponent(city)}&appid=${apikey}`);
       var data=await response.json();
       console.log(data);
      

       document.querySelector(".city").innerHTML=data.name;
    document.querySelector(".temp").innerHTML=data.main.temp+"°C ";
    document.querySelector(".humidity").innerHTML=data.main.humidity+"%";
 document.querySelector(".wind").innerHTML=data.wind.speed+"km/h";
    }
searchbtn.addEventListener("click",()=>{
 checkWeather(searchbox.value);
})

   
</script>

</body>
</html>
